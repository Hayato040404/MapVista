<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MapVista</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bl:#1A73E8;--bll:#E8F0FE;--bld:#1557B0;
  --rd:#EA4335;--gn:#34A853;--yw:#FBBC04;--or:#FF9800;--pu:#9C27B0;
  --w:#fff;--g50:#F8F9FA;--g100:#F1F3F4;--g200:#E8EAED;
  --g300:#DADCE0;--g400:#BDC1C6;--g500:#9AA0A6;--g700:#5F6368;--g900:#202124;
  --s1:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --s2:0 4px 12px rgba(0,0,0,.15),0 2px 4px rgba(0,0,0,.08);
  --s3:0 8px 32px rgba(0,0,0,.18),0 4px 8px rgba(0,0,0,.1);
  --r:8px;--sw:400px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--g100);color:var(--g900)}
#map{position:fixed;inset:0;z-index:0}

/* ── LEAFLET overrides ── */
.leaflet-control-zoom{border:none!important;box-shadow:var(--s2)!important;border-radius:var(--r)!important}
.leaflet-control-zoom a{background:var(--w)!important;color:var(--g700)!important;border:none!important;width:40px!important;height:40px!important;line-height:40px!important;font-size:18px!important;transition:background .15s!important}
.leaflet-control-zoom a:hover{background:var(--g50)!important}
.leaflet-control-zoom-in{border-radius:var(--r) var(--r) 0 0!important;border-bottom:1px solid var(--g200)!important}
.leaflet-control-zoom-out{border-radius:0 0 var(--r) var(--r)!important}
.leaflet-control-attribution{background:rgba(255,255,255,.85)!important;font-size:10px!important}
.leaflet-control-attribution a{color:var(--bl)!important}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:var(--s3)!important;padding:0!important;overflow:hidden!important;border:none!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:var(--w)!important}

/* ── SEARCH BAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:500;padding:10px 12px;pointer-events:none}
#sc{background:var(--w);border-radius:24px;box-shadow:var(--s2);display:flex;align-items:center;max-width:560px;pointer-events:all;position:relative;transition:border-radius .2s}
#sc.open{border-radius:12px 12px 0 0}
#mbtn{width:44px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g700);font-size:18px;flex-shrink:0}
#si{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--g900);background:transparent;padding:14px 0;min-width:0}
#si::placeholder{color:var(--g500)}
#scl{width:38px;height:48px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--g500);font-size:15px}
#scl.v{display:flex}
#sbtn{width:50px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--bl);font-size:18px;border-radius:0 24px 24px 0;transition:background .15s;flex-shrink:0}
#sbtn:hover{background:var(--g50)}
#sug{display:none;background:var(--w);border-radius:0 0 12px 12px;box-shadow:0 8px 16px rgba(0,0,0,.12);overflow:hidden;border-top:1px solid var(--g200)}
#sug.v{display:block}
.si-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.si-row:hover{background:var(--g50)}
.si-ic{width:36px;height:36px;background:var(--g100);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g700);font-size:13px;flex-shrink:0}
.si-tx{flex:1;min-width:0}
.si-nm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-sb{font-size:12px;color:var(--g500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CATEGORY CHIPS ── */
#cats{position:fixed;top:68px;left:0;right:0;z-index:400;padding:0 12px 8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#cats::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--w);border:none;border-radius:20px;padding:7px 14px;margin-right:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;box-shadow:var(--s1);color:var(--g700);transition:all .15s;white-space:nowrap}
.chip:hover{box-shadow:var(--s2)}
.chip.on{background:var(--bll);color:var(--bl)}

/* ── SIDEBAR ── */
#sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);z-index:600;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);background:var(--w);box-shadow:var(--s3);display:flex;flex-direction:column}
#sb.open{transform:translateX(0)}
#sb-in{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sb-in::-webkit-scrollbar{width:4px}
#sb-in::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}

/* ── HOME PANEL ── */
#hp{padding:20px}
.hp-t{font-size:22px;font-weight:700;margin-bottom:4px}
.hp-s{font-size:13px;color:var(--g500);margin-bottom:18px}
.hp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.hp-card{border-radius:12px;padding:16px;cursor:pointer;transition:filter .15s}
.hp-card:hover{filter:brightness(.97)}
.hp-card i{font-size:22px;margin-bottom:8px;display:block}
.hp-card-t{font-size:14px;font-weight:600}
.hp-card-s{font-size:11px;opacity:.7}
.hp-sec{font-size:13px;color:var(--g500);font-weight:500;margin-bottom:8px}
.qtags{display:flex;flex-wrap:wrap;gap:8px}
.qt{background:var(--g100);padding:6px 14px;border-radius:100px;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
.qt:hover{background:var(--g200)}

/* ── PLACE DETAIL ── */
#pd{display:none}
.pd-hdr{padding:20px 20px 16px;border-bottom:1px solid var(--g200)}
.pd-bk{background:none;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g700);font-size:17px;margin-right:8px;transition:background .15s;flex-shrink:0}
.pd-bk:hover{background:var(--g100)}
.pd-nm{font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.3}
.pd-ct{font-size:13px;color:var(--g500);margin-bottom:14px}
.pd-acts{display:flex;gap:8px;flex-wrap:wrap}
.pd-act{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bll);color:var(--bl);border:none;border-radius:var(--r);padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;min-width:60px;transition:background .15s}
.pd-act:hover{background:#d2e3fc}
.pd-act i{font-size:17px}
.pd-row{display:flex;align-items:flex-start;gap:14px;padding:13px 20px;border-bottom:1px solid var(--g100);font-size:14px;line-height:1.5}
.pd-row i{color:var(--g500);width:18px;flex-shrink:0;margin-top:2px}
.pd-row a{color:var(--bl);text-decoration:none}

/* ── ROUTE PANEL ── */
#rp{display:none}
.rp-hdr{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--g200)}
.rp-bk{background:none;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g700);font-size:17px;transition:background .15s}
.rp-bk:hover{background:var(--g100)}
.rp-body{padding:14px 16px}
.ri-row{display:flex;align-items:center;gap:10px;background:var(--g100);border-radius:var(--r);padding:10px 14px;margin-bottom:6px}
.ri-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-a{background:var(--bl)}
.dot-b{background:var(--rd)}
.ri-row input{flex:1;border:none;background:transparent;outline:none;font-size:14px;font-family:inherit;color:var(--g900)}
.ri-row input::placeholder{color:var(--g500)}
.ri-sw-row{display:flex;align-items:center;gap:8px;padding:2px 14px;margin-bottom:6px}
.ri-line{flex:1;height:1px;background:var(--g200)}
.ri-sw{width:30px;height:30px;border:1px solid var(--g300);background:var(--w);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g700);font-size:13px;transition:background .15s}
.ri-sw:hover{background:var(--g100)}
.tms{display:flex;gap:4px;margin:12px 0 10px}
.tm{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border:2px solid transparent;border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--g700);transition:all .15s;background:none;font-family:inherit}
.tm:hover{background:var(--g100)}
.tm.on{border-color:var(--bl);color:var(--bl);background:var(--bll)}
.tm.on.tr{border-color:var(--pu);color:var(--pu);background:#F3E5F5}
.tm i{font-size:19px}
.go-btn{width:100%;padding:12px;background:var(--bl);color:var(--w);border:none;border-radius:var(--r);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.go-btn:hover{background:var(--bld)}
.go-btn:disabled{background:var(--g300);cursor:not-allowed}

/* ── ROUTE CARDS ── */
#rr{margin-top:12px}
.rt-alts{display:flex;flex-direction:column;gap:10px}
.rt-card{background:var(--g50);border-radius:12px;padding:14px 16px;border:2px solid transparent;cursor:pointer;transition:all .2s}
.rt-card:hover{background:var(--g100)}
.rt-card.sel{border-color:var(--bl);background:var(--w);box-shadow:var(--s1)}
.rt-card.sel.tsel{border-color:var(--pu)}
.rt-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.rt-time{font-size:22px;font-weight:700}
.rt-dist{font-size:13px;color:var(--g500)}
.rt-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.rt-tag{font-size:11px;padding:3px 9px;border-radius:100px;font-weight:600}
.rt-eta{font-size:13px;color:var(--g700);font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rt-eta-time{font-size:16px;font-weight:700;color:var(--g900)}

/* Leg bar (transit visual) */
.leg-bar{display:flex;align-items:center;gap:2px;height:10px;margin:10px 0 12px;border-radius:5px;overflow:hidden}
.leg-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;min-width:16px;border-radius:3px;transition:flex .3s}

/* Start NAV button */
.nav-start-btn{width:100%;padding:11px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;color:#fff}
.nav-start-btn.blue{background:var(--bl)}
.nav-start-btn.blue:hover{background:var(--bld)}
.nav-start-btn.purple{background:var(--pu)}
.nav-start-btn.purple:hover{background:#7B1FA2}
.nav-start-btn.green{background:var(--gn)}
.nav-start-btn.green:hover{background:#2E7D32}

/* Driving step list */
.step-list{margin-top:12px;border-top:1px solid var(--g200);padding-top:8px}
.step-item{display:flex;align-items:flex-start;gap:12px;padding:7px 0;border-bottom:1px solid var(--g100)}
.step-item.cs{background:var(--bll);margin:0 -4px;padding:7px 4px;border-radius:var(--r)}
.step-ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.step-tx{flex:1}
.step-nm{font-size:13px;line-height:1.4}
.step-d{font-size:12px;color:var(--g500);margin-top:1px}

/* ── TRANSIT ITINERARY ── */
.ti-legs{display:flex;flex-direction:column;gap:0;margin-top:12px}
.ti-node{display:flex;align-items:flex-start;gap:12px;padding:6px 0}
.ti-node-line{display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0}
.ti-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--w);box-shadow:0 0 0 2px currentColor;flex-shrink:0;z-index:1}
.ti-bar{width:4px;flex:1;min-height:28px;border-radius:2px;margin:2px 0}
.ti-info{flex:1;padding-bottom:4px;min-width:0}
.ti-station{font-size:14px;font-weight:700;line-height:1.3}
.ti-time{font-size:12px;color:var(--g500);margin-bottom:4px}
.ti-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:700;color:#fff;margin:4px 0 2px}
.ti-leg-detail{font-size:12px;color:var(--g500);margin-top:2px;display:flex;align-items:center;gap:4px}
.ti-transfer{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FFF8E1;border-radius:var(--r);border-left:3px solid var(--yw);font-size:12px;color:var(--g700);margin:4px 0}
.ti-stops{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--g500);margin-top:4px;cursor:pointer;width:fit-content}
.ti-stops:hover{color:var(--bl)}
.ti-stop-list{display:none;background:var(--g50);border-radius:var(--r);padding:8px 12px;margin-top:4px;font-size:12px;color:var(--g700)}
.ti-stop-list.v{display:block}
.ti-stop-item{padding:3px 0;border-bottom:1px solid var(--g200)}
.ti-stop-item:last-child{border:none}

/* ── RESULTS LIST ── */
#rl{display:none}
.rl-hdr{padding:14px 20px 10px;border-bottom:1px solid var(--g200);font-size:13px;color:var(--g500);font-weight:500}
.rl-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--g100)}
.rl-item:hover{background:var(--g50)}
.rl-ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rl-inf{flex:1;min-width:0}
.rl-nm{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-ad{font-size:12px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-dt{font-size:12px;color:var(--g500);flex-shrink:0}

/* ── NAVIGATION HUD ── */
#nav-hud{display:none;position:fixed;top:0;left:0;right:0;z-index:2000;pointer-events:none}
#nav-hud.on{display:block}

/* Instruction bar */
#nav-bar{display:flex;align-items:stretch;background:var(--bl);color:#fff;box-shadow:var(--s3);pointer-events:all;min-height:80px;transition:background .3s}
#nav-bar.arrive{background:var(--gn)}
#nav-bar.turn{background:#1565C0}
#nav-bar.transit-leg{background:var(--pu)}
#nav-arrow-box{width:80px;min-width:80px;background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
#nav-text{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
#nav-main{font-size:26px;font-weight:700;letter-spacing:-0.5px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#nav-sub{font-size:13px;opacity:.8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#nav-next-box{display:flex;align-items:center;background:rgba(0,0,0,.12);padding:0 14px;font-size:12px;opacity:.9;flex-shrink:0;max-width:120px;text-align:center;white-space:normal}

/* Progress bar */
#nav-progress{height:3px;background:rgba(255,255,255,.3)}
#nav-progress-fill{height:100%;background:#fff;transition:width .5s;border-radius:0 2px 2px 0}

/* Bottom info */
#nav-btm{display:none;position:fixed;bottom:0;left:0;right:0;z-index:2000;background:var(--w);box-shadow:0 -4px 20px rgba(0,0,0,.15);padding:12px 16px;align-items:center;gap:12px;padding-bottom:calc(12px + env(safe-area-inset-bottom));pointer-events:all}
#nav-btm.on{display:flex}
.nib{display:flex;flex-direction:column;align-items:center;flex:1}
.nib-v{font-size:20px;font-weight:700;color:var(--g900);line-height:1}
.nib-l{font-size:11px;color:var(--g500);margin-top:3px}
.ndiv{width:1px;height:38px;background:var(--g200);flex-shrink:0}
#nav-end{background:var(--rd);color:#fff;border:none;border-radius:var(--r);padding:10px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;transition:background .15s}
#nav-end:hover{background:#C62828}
#nav-recenter{display:none;position:fixed;right:14px;bottom:110px;z-index:2001;width:44px;height:44px;background:var(--w);border:none;border-radius:50%;box-shadow:var(--s2);align-items:center;justify-content:center;cursor:pointer;color:var(--g700);font-size:18px;transition:all .15s}
#nav-recenter.on{display:flex}
#nav-recenter:hover{color:var(--bl)}

/* ── FABs ── */
#fabs{position:fixed;right:12px;bottom:96px;z-index:400;display:flex;flex-direction:column;gap:8px}
.fab{width:44px;height:44px;background:var(--w);border:none;border-radius:50%;box-shadow:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g700);font-size:17px;transition:all .15s}
.fab:hover{box-shadow:var(--s3);background:var(--g50)}
.fab.blu{background:var(--bl);color:#fff}
.fab.blu:hover{background:var(--bld)}

/* ── LAYER MENU ── */
#lm{position:fixed;right:64px;bottom:150px;z-index:800;background:var(--w);border-radius:12px;box-shadow:var(--s3);padding:8px;width:190px;display:none}
#lm.v{display:block}
.lo{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;font-size:14px;transition:background .15s}
.lo:hover{background:var(--g100)}
.lo.on{color:var(--bl);background:var(--bll)}
.lo i{width:16px;text-align:center}
.ldiv{height:1px;background:var(--g200);margin:4px 0}

/* ── BOTTOM TABS ── */
#btabs{position:fixed;bottom:0;left:0;right:0;z-index:700;background:var(--w);border-top:1px solid var(--g200);display:flex;padding:0 0 env(safe-area-inset-bottom)}
#btabs.hide{display:none}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 10px;cursor:pointer;font-size:10px;color:var(--g500);transition:color .15s;border:none;background:none;font-family:inherit}
.btab:hover,.btab.on{color:var(--bl)}
.btab i{font-size:20px}

/* ── MISC ── */
#ov{position:fixed;inset:0;z-index:590;background:rgba(0,0,0,.3);display:none}
#ov.v{display:block}
.loc-ring{width:56px;height:56px;border-radius:50%;background:rgba(26,115,232,.15);display:flex;align-items:center;justify-content:center;animation:lpr 2s infinite}
.loc-dot{width:16px;height:16px;background:var(--bl);border:3px solid var(--w);border-radius:50%;box-shadow:0 2px 8px rgba(26,115,232,.5)}
@keyframes lpr{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.15);opacity:.4}}
.mp-nm{font-size:15px;font-weight:700;padding:14px 16px 6px;color:var(--g900)}
.mp-ad{font-size:12px;color:var(--g500);padding:0 16px 10px}
.mp-btns{display:flex;border-top:1px solid var(--g200)}
.mp-btn{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:500;color:var(--bl);cursor:pointer;border:none;background:none;font-family:inherit;transition:background .15s}
.mp-btn:hover{background:var(--g50)}
.mp-btn+.mp-btn{border-left:1px solid var(--g200)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9000;background:rgba(32,33,36,.9);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;display:none;white-space:nowrap;box-shadow:var(--s3);backdrop-filter:blur(4px)}
#spin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9100;display:none}
.sring{width:40px;height:40px;border:3px solid var(--g200);border-top-color:var(--bl);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}

/* ── RESPONSIVE ── */
@media(min-width:768px){
  #topbar{max-width:var(--sw)}
  #cats{max-width:var(--sw)}
  #sb{transform:translateX(0)}
  #btabs{display:none}
  #fabs{bottom:40px}
  #ov{display:none!important}
  #mbtn{display:none}
}
@media(max-width:767px){
  #sc{max-width:100%}
  #sb{width:100%;top:auto;bottom:56px;height:62vh;transform:translateY(100%);border-radius:16px 16px 0 0}
  #sb.open{transform:translateY(0)}
  #fabs{bottom:66px}
  #toast{bottom:70px}
  #nav-recenter{bottom:130px}
}
</style>
</head>
<body>

<div id="map"></div>
<div id="spin"><div class="sring"></div></div>
<div id="toast"></div>
<div id="ov" onclick="closeSB()"></div>

<!-- ── SEARCH ── -->
<div id="topbar">
  <div id="sc">
    <div id="mbtn" onclick="toggleSB()"><i class="fa fa-bars"></i></div>
    <input id="si" type="text" placeholder="MapVistaで検索" autocomplete="off" spellcheck="false"/>
    <div id="scl" onclick="clearSI()"><i class="fa fa-times"></i></div>
    <div id="sbtn" onclick="doSearch()"><i class="fa fa-search"></i></div>
    <div id="sug"></div>
  </div>
</div>

<!-- ── CHIPS ── -->
<div id="cats">
  <button class="chip" data-c="restaurant" onclick="searchPOI('restaurant','レストラン','🍜','fa-utensils','#E91E63')"><i class="fa fa-utensils" style="color:#E91E63"></i>レストラン</button>
  <button class="chip" data-c="cafe" onclick="searchPOI('cafe','カフェ','☕','fa-mug-hot','#795548')"><i class="fa fa-mug-hot" style="color:#795548"></i>カフェ</button>
  <button class="chip" data-c="convenience_store" onclick="searchPOI('convenience_store','コンビニ','🏪','fa-store','#1A73E8')"><i class="fa fa-store" style="color:var(--bl)"></i>コンビニ</button>
  <button class="chip" data-c="hotel" onclick="searchPOI('hotel','ホテル','🏨','fa-bed','#34A853')"><i class="fa fa-bed" style="color:var(--gn)"></i>ホテル</button>
  <button class="chip" data-c="hospital" onclick="searchPOI('hospital','病院','🏥','fa-hospital','#EA4335')"><i class="fa fa-hospital" style="color:var(--rd)"></i>病院</button>
  <button class="chip" data-c="pharmacy" onclick="searchPOI('pharmacy','薬局','💊','fa-pills','#34A853')"><i class="fa fa-pills" style="color:var(--gn)"></i>薬局</button>
  <button class="chip" data-c="atm" onclick="searchPOI('atm','ATM','🏧','fa-money-bill-wave','#FBBC04')"><i class="fa fa-money-bill-wave" style="color:var(--yw)"></i>ATM</button>
  <button class="chip" data-c="parking" onclick="searchPOI('parking','駐車場','🅿','fa-square-parking','#1A73E8')"><i class="fa fa-square-parking" style="color:var(--bl)"></i>駐車場</button>
  <button class="chip" data-c="fuel" onclick="searchPOI('fuel','ガソリン','⛽','fa-gas-pump','#FF9800')"><i class="fa fa-gas-pump" style="color:var(--or)"></i>ガソリン</button>
  <button class="chip" data-c="supermarket" onclick="searchPOI('supermarket','スーパー','🛒','fa-cart-shopping','#4CAF50')"><i class="fa fa-cart-shopping" style="color:#4CAF50"></i>スーパー</button>
</div>

<!-- ── SIDEBAR ── -->
<div id="sb"><div id="sb-in">

  <!-- HOME -->
  <div id="hp">
    <div class="hp-t">MapVista</div>
    <div class="hp-s">地図を検索・探索する</div>
    <div class="hp-grid">
      <div class="hp-card" style="background:var(--bll)" onclick="openRP()">
        <i class="fa fa-route" style="color:var(--bl)"></i>
        <div class="hp-card-t" style="color:var(--bl)">ルート検索</div>
        <div class="hp-card-s" style="color:var(--bl)">車・電車・自転車</div>
      </div>
      <div class="hp-card" style="background:#E6F4EA" onclick="locateMe()">
        <i class="fa fa-location-crosshairs" style="color:var(--gn)"></i>
        <div class="hp-card-t" style="color:var(--gn)">現在地</div>
        <div class="hp-card-s" style="color:var(--gn)">GPS で取得</div>
      </div>
    </div>
    <div class="hp-sec">よく検索される場所</div>
    <div class="qtags">
      <button class="qt" onclick="qSrch('コンビニ')">🏪 コンビニ</button>
      <button class="qt" onclick="qSrch('カフェ')">☕ カフェ</button>
      <button class="qt" onclick="qSrch('駅')">🚉 駅</button>
      <button class="qt" onclick="qSrch('病院')">🏥 病院</button>
      <button class="qt" onclick="qSrch('公園')">🌳 公園</button>
      <button class="qt" onclick="qSrch('ラーメン')">🍜 ラーメン</button>
    </div>
  </div>

  <!-- PLACE DETAIL -->
  <div id="pd">
    <div class="pd-hdr">
      <div style="display:flex;align-items:flex-start">
        <button class="pd-bk" onclick="showHP()"><i class="fa fa-arrow-left"></i></button>
        <div style="flex:1;min-width:0">
          <div class="pd-nm" id="pd-nm"></div>
          <div class="pd-ct" id="pd-ct"></div>
        </div>
      </div>
      <div class="pd-acts">
        <button class="pd-act" onclick="routeToPlace()"><i class="fa fa-route"></i>ルート</button>
        <button class="pd-act" onclick="savePlace()"><i class="fa fa-bookmark"></i>保存</button>
        <button class="pd-act" onclick="sharePlace()"><i class="fa fa-share-nodes"></i>共有</button>
        <button class="pd-act" onclick="openOSM()"><i class="fa fa-map"></i>OSM</button>
      </div>
    </div>
    <div id="pd-rows"></div>
  </div>

  <!-- ROUTE PANEL -->
  <div id="rp">
    <div class="rp-hdr">
      <button class="rp-bk" onclick="closeRP()"><i class="fa fa-arrow-left"></i></button>
      <span style="font-size:16px;font-weight:600">ルート検索</span>
    </div>
    <div class="rp-body">
      <div class="ri-row">
        <div class="ri-dot dot-a"></div>
        <input id="rf" placeholder="出発地を入力" autocomplete="off"/>
        <i class="fa fa-location-crosshairs" style="color:var(--g400);cursor:pointer;font-size:14px" onclick="useMyLoc()" title="現在地を使用"></i>
      </div>
      <div class="ri-sw-row">
        <div class="ri-line"></div>
        <button class="ri-sw" onclick="swapRI()"><i class="fa fa-arrow-up-down"></i></button>
        <div class="ri-line"></div>
      </div>
      <div class="ri-row">
        <div class="ri-dot dot-b"></div>
        <input id="rt" placeholder="目的地を入力" autocomplete="off"/>
      </div>
      <div class="tms">
        <button class="tm on"  id="tm-drive"   onclick="setTM('drive')"><i class="fa fa-car"></i>車</button>
        <button class="tm"     id="tm-transit" onclick="setTM('transit')"><i class="fa fa-train"></i>電車</button>
        <button class="tm"     id="tm-bike"    onclick="setTM('bike')"><i class="fa fa-bicycle"></i>自転車</button>
        <button class="tm"     id="tm-walk"    onclick="setTM('walk')"><i class="fa fa-person-walking"></i>徒歩</button>
      </div>
      <button class="go-btn" id="go-btn" onclick="calcRoute()">
        <i class="fa fa-magnifying-glass"></i>ルートを検索
      </button>
      <div id="rr"></div>
    </div>
  </div>

  <!-- RESULTS LIST -->
  <div id="rl">
    <div class="rl-hdr" id="rl-hdr">検索結果</div>
    <div id="rl-items"></div>
  </div>

</div></div>

<!-- ── NAVIGATION HUD ── -->
<div id="nav-hud">
  <div id="nav-bar">
    <div id="nav-arrow-box"><span id="nav-arrow">↑</span></div>
    <div id="nav-text">
      <div id="nav-main">出発します</div>
      <div id="nav-sub">—</div>
    </div>
    <div id="nav-next-box" id="nav-nb"><span id="nav-nb-txt">—</span></div>
  </div>
  <div id="nav-progress"><div id="nav-progress-fill" style="width:0%"></div></div>
</div>
<div id="nav-btm">
  <div class="nib"><div class="nib-v" id="nav-rt">—</div><div class="nib-l">残り時間</div></div>
  <div class="ndiv"></div>
  <div class="nib"><div class="nib-v" id="nav-rd">—</div><div class="nib-l">残り距離</div></div>
  <div class="ndiv"></div>
  <div class="nib"><div class="nib-v" id="nav-eta">—</div><div class="nib-l">到着予定</div></div>
  <button id="nav-end" onclick="stopNav()"><i class="fa fa-stop"></i> 終了</button>
</div>
<button id="nav-recenter" onclick="navRecenter()"><i class="fa fa-location-crosshairs"></i></button>

<!-- ── FABs ── -->
<div id="fabs">
  <button class="fab" onclick="toggleLM()"><i class="fa fa-layer-group"></i></button>
  <button class="fab blu" onclick="locateMe()"><i class="fa fa-location-crosshairs"></i></button>
</div>

<!-- Layer Menu -->
<div id="lm">
  <div class="lo on" id="lo-default"   onclick="setLayer('default')"><i class="fa fa-map"></i>標準</div>
  <div class="lo"    id="lo-satellite" onclick="setLayer('satellite')"><i class="fa fa-satellite"></i>衛星写真</div>
  <div class="lo"    id="lo-topo"      onclick="setLayer('topo')"><i class="fa fa-mountain"></i>地形図</div>
  <div class="lo"    id="lo-cycle"     onclick="setLayer('cycle')"><i class="fa fa-bicycle"></i>サイクリング</div>
  <div class="ldiv"></div>
  <div class="lo"    id="lo-dark"      onclick="setLayer('dark')"><i class="fa fa-moon"></i>ダーク</div>
</div>

<!-- BOTTOM TABS -->
<div id="btabs">
  <button class="btab on" id="bt-e" onclick="setBT('e')"><i class="fa fa-compass"></i>探索</button>
  <button class="btab"    id="bt-r" onclick="setBT('r');openRP()"><i class="fa fa-route"></i>ルート</button>
  <button class="btab"    id="bt-s" onclick="setBT('s');showSaved()"><i class="fa fa-bookmark"></i>保存済み</button>
  <button class="btab"    id="bt-m" onclick="setBT('m')"><i class="fa fa-ellipsis"></i>その他</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  CONSTANTS  (OSRM base is just the host)
// ═══════════════════════════════════════════
const OSRM_BASE = 'https://router.project-osrm.org'; // NO trailing /route/v1
const NOM       = 'https://nominatim.openstreetmap.org';
const OVP       = 'https://overpass-api.de/api/interpreter';
const TRANSITOUS= 'https://api.transitous.org';

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let map, tile, myM, myAcc;
let poiMs=[], rtLayers=[], rtMs=[];
let selPlace=null, tMode='drive', myLL=null, saved=[];
let currentItins=[], selRoute=null;
let nav={active:false,steps:[],cur:0,wid:null,totalDist:0,totalDur:0,remainDist:0,remainDur:0,destLL:null,pts:[],mode:'drive',startTime:0};
let navFollowing=true, demoIv=null;

// ═══════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════
function initMap(){
  map=L.map('map',{center:[35.6762,139.6503],zoom:14,zoomControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.control.scale({position:'bottomright',imperial:false}).addTo(map);
  tile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(map);
  map.on('click',e=>{document.getElementById('lm').classList.remove('v');showCoordPopup(e.latlng)});
  map.on('movestart',()=>{if(nav.active){navFollowing=false;document.getElementById('nav-recenter').classList.add('on')}});
}

// ═══════════════════════════════════════════
//  LAYERS
// ═══════════════════════════════════════════
const LAYERS={
  default:  {u:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',        a:'© OpenStreetMap',m:19},
  satellite:{u:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',a:'© Esri',m:19},
  topo:     {u:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',           a:'© OpenTopoMap',m:17},
  cycle:    {u:'https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png',a:'© CyclOSM',m:19},
  dark:     {u:'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',a:'© Stadia Maps',m:20},
};
function setLayer(t){
  map.removeLayer(tile);const l=LAYERS[t]||LAYERS.default;
  tile=L.tileLayer(l.u,{attribution:l.a,maxZoom:l.m}).addTo(map);
  document.querySelectorAll('.lo').forEach(e=>e.classList.remove('on'));
  document.getElementById('lo-'+t)?.classList.add('on');
  document.getElementById('lm').classList.remove('v');
}
function toggleLM(){document.getElementById('lm').classList.toggle('v')}

// ═══════════════════════════════════════════
//  SEARCH + SUGGESTIONS
// ═══════════════════════════════════════════
const $si=()=>document.getElementById('si');
let dbt;
document.addEventListener('DOMContentLoaded',()=>{
  const inp=$si();
  inp.addEventListener('focus',()=>document.getElementById('sc').classList.add('open'));
  inp.addEventListener('blur',()=>setTimeout(()=>{document.getElementById('sc').classList.remove('open');document.getElementById('sug').classList.remove('v')},200));
  inp.addEventListener('input',()=>{
    const q=inp.value.trim();
    document.getElementById('scl').classList.toggle('v',q.length>0);
    clearTimeout(dbt);
    if(q.length<2){document.getElementById('sug').classList.remove('v');return}
    dbt=setTimeout(()=>fetchSug(q),350);
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){doSearch();document.getElementById('sug').classList.remove('v')}});
});
async function fetchSug(q){
  try{
    const r=await fetch(`${NOM}/search?q=${enc(q)}&format=json&limit=6&accept-language=ja`);
    const d=await r.json();
    if(!d.length){document.getElementById('sug').classList.remove('v');return}
    document.getElementById('sug').innerHTML=d.map(p=>{
      const nm=p.display_name.split(',')[0];
      const sb=p.display_name.split(',').slice(1,3).join(', ').trim();
      return `<div class="si-row" onmousedown="gotoR(${p.lat},${p.lon},'${esc(p.display_name)}','${esc(p.type)}')">
        <div class="si-ic"><i class="fa ${tIcon(p.type,p.class)}"></i></div>
        <div class="si-tx"><div class="si-nm">${nm}</div><div class="si-sb">${sb}</div></div></div>`;
    }).join('');
    document.getElementById('sug').classList.add('v');
  }catch{}
}
async function doSearch(){
  const q=$si().value.trim();if(!q)return;
  document.getElementById('sug').classList.remove('v');spin(true);
  try{
    const r=await fetch(`${NOM}/search?q=${enc(q)}&format=json&limit=10&accept-language=ja&addressdetails=1`);
    const d=await r.json();spin(false);
    if(!d.length){toast('場所が見つかりませんでした');return}
    d.length===1?gotoR(d[0].lat,d[0].lon,d[0].display_name,d[0].type):showRL(d,q);
  }catch{spin(false);toast('検索エラー')}
}
function qSrch(q){$si().value=q;document.getElementById('scl').classList.add('v');doSearch()}
function clearSI(){$si().value='';document.getElementById('scl').classList.remove('v');document.getElementById('sug').classList.remove('v');$si().focus()}
function showRL(data,query){
  clearPOIs();showPanel('rl');
  document.getElementById('rl-hdr').textContent=`「${query}」 (${data.length}件)`;
  document.getElementById('rl-items').innerHTML=data.map(p=>{
    const nm=p.display_name.split(',')[0];
    const sub=p.display_name.split(',').slice(1,3).join(', ').trim();
    const ic=tIcon(p.type,p.class),col=tColor(p.type);
    const d=myLL?` · ${fDist(haverD(myLL.lat,myLL.lng,+p.lat,+p.lon))}`:'';
    const m=addPOI(+p.lat,+p.lon,nm,p.type,ic,col);
    m.on('click',()=>gotoR(p.lat,p.lon,p.display_name,p.type));
    return `<div class="rl-item" onclick="gotoR(${p.lat},${p.lon},'${esc(p.display_name)}','${esc(p.type)}')">
      <div class="rl-ic" style="background:${col}20"><i class="fa ${ic}" style="color:${col}"></i></div>
      <div class="rl-inf"><div class="rl-nm">${nm}</div><div class="rl-ad">${sub}</div></div>
      <span class="rl-dt">${d}</span></div>`;
  }).join('');
  openSB();
  try{map.fitBounds(L.latLngBounds(data.map(p=>[+p.lat,+p.lon])),{padding:[60,60]})}catch{}
}
function gotoR(lat,lon,name,type){
  document.getElementById('sug').classList.remove('v');
  const nm=name.split(',')[0];$si().value=nm;
  map.flyTo([lat,lon],17,{duration:1});
  showPD({lat:+lat,lon:+lon,name:nm,fullName:name,type});
}

// ═══════════════════════════════════════════
//  POI  (Overpass)
// ═══════════════════════════════════════════
const OQ={restaurant:'amenity=restaurant',cafe:'amenity=cafe',convenience_store:'shop=convenience',hotel:'tourism=hotel',hospital:'amenity=hospital',pharmacy:'amenity=pharmacy',atm:'amenity=atm',parking:'amenity=parking',fuel:'amenity=fuel',supermarket:'shop=supermarket'};
let actCat=null;
async function searchPOI(cat,label,emoji,icon,color){
  if(actCat===cat){actCat=null;clearPOIs();document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));return}
  actCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelector(`[data-c="${cat}"]`)?.classList.add('on');
  clearPOIs();spin(true);
  const b=map.getBounds();
  const bbox=`${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
  const [k,v]=(OQ[cat]||'amenity=restaurant').split('=');
  const oq=`[out:json][timeout:20];(node["${k}"="${v}"](${bbox});way["${k}"="${v}"](${bbox}););out center 50;`;
  try{
    const r=await fetch(OVP,{method:'POST',body:`data=${enc(oq)}`});
    const d=await r.json();spin(false);
    const els=d.elements||[];
    if(!els.length){toast(`${emoji} 周辺に${label}が見つかりませんでした`);return}
    const items=[];
    els.forEach(el=>{
      const lat=el.lat||el.center?.lat,lng=el.lon||el.center?.lon;
      if(!lat||!lng)return;
      const name=el.tags?.name||el.tags?.['name:ja']||label;
      const m=addPOI(lat,lng,name,cat,icon,color);
      m.on('click',()=>{map.flyTo([lat,lng],17,{duration:.8});showPD({lat,lon:lng,name,type:cat,address:el.tags?.['addr:full']||el.tags?.['addr:street']||'',phone:el.tags?.phone||'',website:el.tags?.website||'',opening:el.tags?.opening_hours||''})});
      items.push({lat,lng,name,addr:el.tags?.['addr:street']||''});
    });
    showPanel('rl');
    document.getElementById('rl-hdr').textContent=`${emoji} 周辺の${label} (${items.length}件)`;
    document.getElementById('rl-items').innerHTML=items.map(it=>{
      const d=myLL?fDist(haverD(myLL.lat,myLL.lng,it.lat,it.lng)):'';
      return `<div class="rl-item" onclick="map.flyTo([${it.lat},${it.lng}],17,{duration:.8})">
        <div class="rl-ic" style="background:${color}20"><i class="fa ${icon}" style="color:${color}"></i></div>
        <div class="rl-inf"><div class="rl-nm">${it.name}</div><div class="rl-ad">${it.addr}</div></div>
        <span class="rl-dt">${d}</span></div>`;
    }).join('');
    openSB();toast(`${emoji} ${items.length}件の${label}を表示`);
  }catch{spin(false);toast('データ取得に失敗しました')}
}
function addPOI(lat,lng,name,type,icon,color){
  const m=L.marker([lat,lng],{icon:L.divIcon({className:'',
    html:`<div style="width:30px;height:30px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><i class="fa ${icon}" style="color:#fff;font-size:12px;transform:rotate(45deg)"></i></div>`,
    iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-30]
  })}).addTo(map);
  poiMs.push(m);return m;
}
function clearPOIs(){poiMs.forEach(m=>map.removeLayer(m));poiMs=[]}

// ═══════════════════════════════════════════
//  PLACE DETAIL
// ═══════════════════════════════════════════
function showPD(p){
  selPlace=p;
  document.getElementById('pd-nm').textContent=p.name;
  document.getElementById('pd-ct').textContent=catLabel(p.type);
  const rows=[];
  if(p.address)rows.push(pdRow('fa-location-dot',p.address));
  if(p.phone)  rows.push(pdRow('fa-phone',`<a href="tel:${p.phone}">${p.phone}</a>`));
  if(p.opening)rows.push(pdRow('fa-clock',p.opening));
  if(p.website)rows.push(pdRow('fa-globe',`<a href="${p.website}" target="_blank">ウェブサイトを開く</a>`));
  rows.push(pdRow('fa-map-pin',`${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}`));
  document.getElementById('pd-rows').innerHTML=rows.join('');
  showPanel('pd');openSB();
}
function pdRow(ic,tx){return`<div class="pd-row"><i class="fa ${ic}"></i><span>${tx}</span></div>`}
function routeToPlace(){if(!selPlace)return;document.getElementById('rt').value=selPlace.name;openRP()}
function savePlace(){if(!selPlace)return;saved.push({...selPlace});toast('⭐ 保存しました')}
function sharePlace(){if(!selPlace)return;navigator.clipboard?.writeText(`https://www.openstreetmap.org/?mlat=${selPlace.lat}&mlon=${selPlace.lon}&zoom=17`).then(()=>toast('🔗 リンクをコピーしました'))}
function openOSM(){if(!selPlace)return;window.open(`https://www.openstreetmap.org/?mlat=${selPlace.lat}&mlon=${selPlace.lon}&zoom=17`,'_blank')}
function showCoordPopup(ll){

// ── OSRM (car / walk / bike) ─────────────────
async function calcOSRM(fLL,tLL,mode){
  const profile={drive:'car',walk:'foot',bike:'bicycle'}[mode]||'car';
  // ✅ Fixed URL: OSRM_BASE already = 'https://router.project-osrm.org'
  const url=`${OSRM_BASE}/route/v1/${profile}/${fLL.lng},${fLL.lat};${tLL.lng},${tLL.lat}?overview=full&geometries=polyline&steps=true&alternatives=true`;
  const res=await fetch(url);
  const data=await res.json();
  if(data.code!=='Ok'||!data.routes?.length)throw new Error('OSRM: no route');

  const colors=['#1A73E8','#80868B','#AECBFA'];
  data.routes.forEach((rt,i)=>{
    const pts=decodePL_OSRM(rt.geometry);
    const layer=L.polyline(pts,{color:colors[i]||colors[2],weight:i===0?6:4,opacity:i===0?.9:.35}).addTo(map);
    rtLayers.push(layer);
    if(i>0)layer.on('click',()=>{
      rtLayers.forEach((l,j)=>l.setStyle({opacity:j===i?.9:.35,weight:j===i?6:4}));
      selRoute={...selRoute,pts,steps:rt.legs[0]?.steps||[],duration:rt.duration,distance:rt.distance};
      renderStepsInCard(i,rt.legs[0]?.steps||[]);
    });
  });

  rtMs.push(L.marker(fLL,{icon:pinIc({drive:'#1A73E8',bike:'#34A853',walk:'#5F6368'}[mode]||'#1A73E8','A')}).addTo(map));
  rtMs.push(L.marker(tLL,{icon:pinIc('#EA4335','B')}).addTo(map));
  try{map.fitBounds(L.latLngBounds(decodePL(data.routes[0].geometry)),{padding:[80,80]})}catch{}

  const modeCol={drive:'var(--bl)',bike:'var(--gn)',walk:'var(--g700)'}[mode]||'var(--bl)';
  const modeIc={drive:'fa-car',bike:'fa-bicycle',walk:'fa-person-walking'}[mode]||'fa-car';
  const startBtnCls={drive:'blue',bike:'green',walk:'blue'}[mode]||'blue';

  document.getElementById('rr').innerHTML=`<div class="rt-alts">${data.routes.map((rt,i)=>{
    const steps=rt.legs[0]?.steps||[];
    const eta=calcETA(rt.duration);
    const via=steps.filter(s=>s.name).slice(2,5).map(s=>s.name).join(' → ');
    return `<div class="rt-card${i===0?' sel':''}" id="rcard-${i}">
      <div class="rt-top">
        <span class="rt-time" style="color:${modeCol}">${fDur(rt.duration)}</span>
        <span class="rt-dist">${fDist(rt.distance)}</span>
      </div>
      ${via?`<div style="font-size:12px;color:var(--g500);margin-bottom:8px"><i class="fa ${modeIc}" style="margin-right:4px"></i>経由: ${via}</div>`:''}
      <div class="rt-eta"><i class="fa fa-clock" style="color:var(--g400)"></i>到着予定: <span class="rt-eta-time">${eta}</span></div>
      <div class="rt-tags">
        <span class="rt-tag" style="background:${modeCol}18;color:${modeCol}">${i===0?'最短時間':i===1?'代替ルート':'別ルート'}</span>
        <span class="rt-tag" style="background:var(--g100);color:var(--g700)"><i class="fa fa-road" style="margin-right:3px"></i>${fDist(rt.distance)}</span>
      </div>
      ${i===0?`<button class="nav-start-btn ${startBtnCls}" onclick="startNavOSRM(event,0)"><i class="fa fa-location-arrow"></i>案内開始</button>`:''}
      ${i===0?`<div class="step-list">${buildDrivingSteps(steps)}</div>`:''}
    </div>`;
  }).join('')}</div>`;

  selRoute={pts:decodePL(data.routes[0].geometry),steps:data.routes[0].legs[0]?.steps||[],duration:data.routes[0].duration,distance:data.routes[0].distance,fLL,tLL,mode};
  toast(`✅ ${data.routes.length}件のルートを表示`);
}

function buildDrivingSteps(steps){
  return steps.slice(0,20).map((s,i)=>{
    const mod=s.maneuver?.modifier||'';
    const type=s.maneuver?.type||'';
    const ic=mIc(type,mod);
    const ar=mArrow(type,mod);
    return `<div class="step-item" id="si-${i}">
      <div class="step-ic" style="background:var(--bll)"><i class="fa ${ic}" style="color:var(--bl)"></i></div>
      <div class="step-tx"><div class="step-nm">${ar} ${s.name||'名称なし'}</div><div class="step-d">${fDist(s.distance)}</div></div>
    </div>`;
  }).join('')+(steps.length>20?`<div style="padding:8px 0;font-size:12px;color:var(--g500)">他 ${steps.length-20} ステップ</div>`:'');
}

function renderStepsInCard(idx,steps){
  const c=document.getElementById('rcard-'+idx);if(!c)return;
  let sl=c.querySelector('.step-list');
  if(!sl){sl=document.createElement('div');sl.className='step-list';c.appendChild(sl)}
  sl.innerHTML=buildDrivingSteps(steps);
}

// ── TRANSIT ROUTING ──────────────────────────
// Strategy:
//  1. Try Transitous (MOTIS2) with Unix-second timestamp
//  2. On any failure → fall back to Overpass station search
//     + OSRM walk segments + realistic Japanese rail simulation

async function calcTransit(fLL,tLL){
  toast('🚃 電車ルートを計算中...');
  spin(true);

  // ── attempt Transitous ──
  let itins = await tryTransitous(fLL,tLL);

  // ── fallback: Overpass + simulation ──
  if(!itins?.length){
    console.log('[Transit] Transitous returned nothing → fallback');
    itins = await buildFallbackTransit(fLL,tLL);
  }

  spin(false);

  if(!itins?.length){
    document.getElementById('rr').innerHTML=`
      <div style="padding:20px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">🚃</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">電車ルートが見つかりませんでした</div>
        <div style="font-size:13px;color:var(--g500);margin-bottom:16px;line-height:1.6">
          出発地・目的地周辺に駅が見つからないか、<br>この地域の公共交通データがありません。
        </div>
        <div style="display:flex;gap:8px">
          <button class="go-btn" style="flex:1" onclick="setTM('drive');calcRoute()"><i class="fa fa-car"></i> 車で検索</button>
          <button class="go-btn" style="flex:1;background:var(--g700)" onclick="setTM('walk');calcRoute()"><i class="fa fa-person-walking"></i> 徒歩</button>
        </div>
      </div>`;
    return;
  }

  currentItins = itins;
  renderTransitItins(itins,fLL,tLL);
}

// ── 1. Transitous (MOTIS2 v5) ───────────────
// Spec: time=ISO8601 date-time, endpoint=/api/v5/plan, response=body.itineraries
async function tryTransitous(fLL,tLL){
  // ✅ Correct: ISO 8601 date-time string (type:string, format:date-time)
  const time = new Date().toISOString(); // e.g. "2026-03-31T13:15:00.000Z"

  const params = new URLSearchParams({
    fromPlace:          `${fLL.lat},${fLL.lng}`,
    toPlace:            `${tLL.lat},${tLL.lng}`,
    time,                            // ISO 8601
    numItineraries:     '5',
    searchWindow:       '3600',      // 1-hour window → more options
    maxPreTransitTime:  '1200',      // 20-min max walk to first stop
    maxPostTransitTime: '1200',      // 20-min max walk from last stop
    pedestrianSpeed:    '1.4',       // m/s (replaces deprecated walkSpeed)
    language:           'ja',
    // transitModes defaults to TRANSIT (all modes)
    // preTransitModes / postTransitModes default to WALK
    // directModes defaults to WALK
  });

  try{
    // ✅ Correct endpoint: /api/v5/plan (not /api/v1/plan)
    const url = `${TRANSITOUS}/api/v5/plan?${params}`;
    console.log('[Transitous v5] GET', url);
    const r    = await fetch(url, {
      signal:  AbortSignal.timeout(14000),
      headers: {'Accept':'application/json'},
    });
    const body = await r.json();
    console.log('[Transitous v5]', r.status, JSON.stringify(body).slice(0,400));

    if(!r.ok){ console.warn('[Transitous v5] error:', body); return null; }

    // ✅ Correct: v5 response is body.itineraries (not body.plan.itineraries)
    if(body.itineraries?.length) return body.itineraries;
    // backward compat with v1-style wrapper (just in case)
    if(body.plan?.itineraries?.length) return body.plan.itineraries;
  }catch(e){ console.warn('[Transitous v5] failed:', e.message) }
  return null;
}

// ── 2. Fallback: Overpass stations + simulation ──
async function buildFallbackTransit(fLL,tLL){
  const SEARCH_R = 2000; // 2km radius for nearby stations

  // Fetch stations near origin and destination in parallel
  const [fromStns, toStns] = await Promise.all([
    fetchStations(fLL.lat, fLL.lng, SEARCH_R),
    fetchStations(tLL.lat, tLL.lng, SEARCH_R),
  ]);

  if(!fromStns.length || !toStns.length){
    toast('⚠️ 周辺に鉄道駅が見つかりません');
    return null;
  }

  // Walk segments from/to nearest stations (OSRM)
  const fromStn = fromStns[0];
  const toStn   = toStns[0];

  const [walkTo, walkFrom] = await Promise.all([
    osrmWalk(fLL, {lat:fromStn.lat, lng:fromStn.lon}),
    osrmWalk({lat:toStn.lat, lng:toStn.lon}, tLL),
  ]);

  // Build 3 route alternatives with different transfer patterns
  const itins = [];

  // Route A: Direct (no transfer if same network, else 1 transfer at midpoint)
  itins.push(buildSimItinerary(fLL, tLL, fromStn, toStn, walkTo, walkFrom, 0));

  // Route B: 1 transfer via interchange (only if stations are > 5km apart)
  const directDist = haverD(fromStn.lat, fromStn.lon, toStn.lat, toStn.lon);
  if(directDist > 5000 && fromStns.length > 1){
    const midStn = fromStns[1];
    itins.push(buildSimItinerary(fLL, tLL, fromStn, toStn, walkTo, walkFrom, 1, midStn));
  }

  // Route C: Alternative nearest station
  if(fromStns.length > 1 && toStns.length > 1){
    const walkTo2   = await osrmWalk(fLL, {lat:fromStns[1].lat, lng:fromStns[1].lon});
    const walkFrom2 = await osrmWalk({lat:toStns[1].lat, lng:toStns[1].lon}, tLL);
    itins.push(buildSimItinerary(fLL, tLL, fromStns[1], toStns[1], walkTo2, walkFrom2, 0));
  }

  return itins.filter(Boolean);
}

// Build one simulated itinerary
function buildSimItinerary(fLL, tLL, fromStn, toStn, walkTo, walkFrom, transfers, midStn=null){
  const now      = Date.now();
  const walkToDur   = walkTo?.duration  || Math.round(haverD(fLL.lat,fLL.lng,fromStn.lat,fromStn.lon)/80); // ~80m/min walk
  const walkFromDur = walkFrom?.duration || Math.round(haverD(toStn.lat,toStn.lon,tLL.lat,tLL.lng)/80);

  const walkToDist   = walkTo?.distance  || haverD(fLL.lat,fLL.lng,fromStn.lat,fromStn.lon);
  const walkFromDist = walkFrom?.distance || haverD(toStn.lat,toStn.lon,tLL.lat,tLL.lng);

  const trainDist = haverD(fromStn.lat,fromStn.lon,toStn.lat,toStn.lon);
  // Realistic Japanese rail: 35km/h local, 60km/h if > 15km (express)
  const speedKph  = trainDist > 15000 ? 60 : 35;
  const trainDur  = Math.max(120, Math.round((trainDist/1000/speedKph)*3600));
  const waitAtStn = 180; // 3 min wait at origin station
  const transferWait = transfers > 0 ? 360 : 0; // 6 min transfer wait

  const dep1  = now + walkToDur*1000;
  const dep2  = dep1 + waitAtStn*1000;
  let   arr2, dep3, arr3;

  if(transfers > 0 && midStn){
    const legDist = haverD(fromStn.lat,fromStn.lon,midStn.lat,midStn.lon);
    const legDur  = Math.max(60, Math.round((legDist/1000/speedKph)*3600));
    arr2  = dep2 + legDur*1000;
    dep3  = arr2 + transferWait*1000;
    arr3  = dep3 + (trainDur - legDur)*1000;
  } else {
    arr2  = dep2 + trainDur*1000;
    dep3  = arr2;
    arr3  = arr2;
  }

  const arrDest = arr3 + walkFromDur*1000;
  const totalDur = Math.round((arrDest - now)/1000);

  // Intermediate stops (estimate ~800m per stop)
  const estStops = Math.max(1, Math.round(trainDist/800));
  const intStops = generateFakeStops(fromStn, toStn, estStops, midStn);

  const lineName = guessLineName(fromStn, toStn);
  const lineCol  = guessLineColor(lineName);

  const legs = [];

  // Leg 1: Walk to station
  legs.push({
    mode:'WALK', duration:walkToDur, distance:walkToDist,
    startTime: new Date(now).toISOString(), endTime: new Date(dep1).toISOString(),
    from:{name:'出発地', lat:fLL.lat, lon:fLL.lng},
    to:  {name:fromStn.name, lat:fromStn.lat, lon:fromStn.lon},
    legGeometry:{points: walkTo?.geometry || straightPL([fLL, {lat:fromStn.lat,lng:fromStn.lon}])},
    steps: walkTo?.steps || [],
  });

  // Leg 2: Train (first segment)
  if(transfers > 0 && midStn){
    legs.push({
      mode:'RAIL', duration: Math.round((arr2-dep2)/1000),
      distance: haverD(fromStn.lat,fromStn.lon,midStn.lat,midStn.lon),
      startTime:dep2, endTime:arr2,
      from:{name:fromStn.name, lat:fromStn.lat, lon:fromStn.lon},
      to:  {name:midStn.name,  lat:midStn.lat,  lon:midStn.lon},
      route:{shortName:lineName, longName:lineName, color:lineCol.slice(1)},
      headsign: midStn.name+'方面',
      intermediateStops: generateFakeStops(fromStn, midStn, Math.max(1,Math.round(haverD(fromStn.lat,fromStn.lon,midStn.lat,midStn.lon)/800)), null).slice(1,-1),
      legGeometry:{points: straightPL([{lat:fromStn.lat,lng:fromStn.lon},{lat:midStn.lat,lng:midStn.lon}])},
    });
    // Transfer walk
    legs.push({
      mode:'WALK', duration:Math.round(transferWait/2), distance:200,
      startTime:arr2, endTime:dep3,
      from:{name:midStn.name, lat:midStn.lat, lon:midStn.lon},
      to:  {name:midStn.name, lat:midStn.lat, lon:midStn.lon},
      legGeometry:{points: straightPL([{lat:midStn.lat,lng:midStn.lon},{lat:midStn.lat,lng:midStn.lon}])},
      steps:[],
    });
    // Leg 2b: Train to destination
    legs.push({
      mode:'RAIL', duration:Math.round((arr3-dep3)/1000),
      distance: haverD(midStn.lat,midStn.lon,toStn.lat,toStn.lon),
      startTime:dep3, endTime:arr3,
      from:{name:midStn.name, lat:midStn.lat, lon:midStn.lon},
      to:  {name:toStn.name,  lat:toStn.lat,  lon:toStn.lon},
      route:{shortName:lineName, longName:lineName, color:lineCol.slice(1)},
      headsign: toStn.name+'方面',
      intermediateStops: generateFakeStops(midStn, toStn, Math.max(1,Math.round(haverD(midStn.lat,midStn.lon,toStn.lat,toStn.lon)/800)),null).slice(1,-1),
      legGeometry:{points: straightPL([{lat:midStn.lat,lng:midStn.lon},{lat:toStn.lat,lng:toStn.lon}])},
    });
  } else {
    legs.push({
      mode:'RAIL', duration:trainDur, distance:trainDist,
      startTime:dep2, endTime:arr2,
      from:{name:fromStn.name, lat:fromStn.lat, lon:fromStn.lon},
      to:  {name:toStn.name,   lat:toStn.lat,   lon:toStn.lon},
      route:{shortName:lineName, longName:lineName, color:lineCol.slice(1)},
      headsign: toStn.name+'方面',
      intermediateStops: intStops.slice(1,-1),
      legGeometry:{points: straightPL([{lat:fromStn.lat,lng:fromStn.lon},{lat:toStn.lat,lng:toStn.lon}])},
    });
  }

  // Final walk from station
  legs.push({
    mode:'WALK', duration:walkFromDur, distance:walkFromDist,
    startTime:arr3, endTime:arrDest,
    from:{name:toStn.name, lat:toStn.lat, lon:toStn.lon},
    to:  {name:'目的地',   lat:tLL.lat,   lon:tLL.lng},
    legGeometry:{points: walkFrom?.geometry || straightPL([{lat:toStn.lat,lng:toStn.lon}, tLL])},
    steps: walkFrom?.steps || [],
  });

  // Use ISO 8601 strings for consistency with Transitous v5 API response format
  return {
    duration: totalDur,
    startTime: new Date(now).toISOString(),
    endTime:   new Date(arrDest).toISOString(),
    transfers,
    legs,
    isFallback: true,
  };
}

// Straight-line encoded polyline (simple 2-point)
function straightPL(pts){
  // Just return empty string – drawTransitItin will draw leg.from→leg.to
  return '';
}

// Fetch real OSM railway stations via Overpass
async function fetchStations(lat,lng,radius){
  const oq=`[out:json][timeout:10];(
    node["railway"="station"](around:${radius},${lat},${lng});
    node["railway"="halt"](around:${radius},${lat},${lng});
    node["public_transport"="stop_position"]["train"="yes"](around:${radius},${lat},${lng});
    node["public_transport"="station"](around:${radius},${lat},${lng});
  );out body 8;`;
  try{
    const r=await fetch(OVP,{method:'POST',body:`data=${enc(oq)}`,signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    const els=(d.elements||[]).map(e=>({
      lat:e.lat, lon:e.lon,
      name: e.tags?.['name:ja']||e.tags?.name||'駅',
      network: e.tags?.network||e.tags?.operator||'',
      line: e.tags?.['railway:ref']||e.tags?.ref||'',
    }));
    // Sort by distance
    els.sort((a,b)=>haverD(lat,lng,a.lat,a.lon)-haverD(lat,lng,b.lat,b.lon));
    return els;
  }catch(e){console.warn('fetchStations failed',e);return[]}
}

// OSRM walking route
async function osrmWalk(fLL,tLL){
  try{
    const url=`${OSRM_BASE}/route/v1/foot/${fLL.lng||fLL.lon},${fLL.lat};${tLL.lng||tLL.lon},${tLL.lat}?overview=full&geometries=polyline&steps=true`;
    const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
    const d=await r.json();
    if(d.code!=='Ok'||!d.routes?.length) return null;
    const rt=d.routes[0];
    return {duration:rt.duration, distance:rt.distance, geometry:rt.geometry, steps:rt.legs[0]?.steps||[]};
  }catch{return null}
}

// Guess line name from station network tags
function guessLineName(fromStn, toStn){
  const n=fromStn.network||toStn.network||fromStn.line||toStn.line||'';
  if(n.includes('JR')||n.includes('jr'))return'JR';
  if(n.includes('東急'))return'東急電鉄';
  if(n.includes('小田急'))return'小田急';
  if(n.includes('京急'))return'京急';
  if(n.includes('東京メトロ')||n.includes('Metro'))return '東京メトロ';
  if(n.includes('都営'))return '都営';
  if(n.includes('近鉄'))return '近鉄';
  if(n.includes('阪急'))return '阪急';
  if(n.includes('阪神'))return '阪神';
  return n||'鉄道';
}

function guessLineColor(name){
  if(name.includes('JR'))        return '#80CC28';
  if(name.includes('東急'))      return '#E31E24';
  if(name.includes('小田急'))    return '#0062AC';
  if(name.includes('京急'))      return '#E60012';
  if(name.includes('東京メトロ'))return '#179CD7';
  if(name.includes('都営'))      return '#009EAA';
  if(name.includes('近鉄'))      return '#004B8D';
  if(name.includes('阪急'))      return '#89233C';
  if(name.includes('阪神'))      return '#0067C0';
  return '#9C27B0';
}

function generateFakeStops(fromStn, toStn, count, midStn){
  // Interpolate between from and to
  const stops=[{name:fromStn.name}];
  for(let i=1;i<count;i++){
    const t=i/count;
    stops.push({name:`途中駅${i}`, lat:fromStn.lat+(toStn.lat-fromStn.lat)*t, lon:fromStn.lon+(toStn.lon-fromStn.lon)*t});
  }
  stops.push({name:toStn.name});
  return stops;
}

// ── Render functions ─────────────────────────
function renderTransitItins(itins,fLL,tLL){
  drawTransitItin(itins[0]);
  selRoute=itin2Route(itins[0],fLL,tLL);
  document.getElementById('rr').innerHTML=`<div class="rt-alts">
    ${itins.map((it,i)=>buildTransitCard(it,i)).join('')}
  </div>`;
  if(itins[0].isFallback){
    const note=document.createElement('div');
    note.style.cssText='font-size:11px;color:var(--g500);padding:8px 4px;text-align:center';
    note.textContent='※ リアルタイムデータが取得できないため、推定ルートを表示しています';
    document.getElementById('rr').appendChild(note);
  }
}

function buildTransitCard(itin,idx){
  const sStr=fTime(itin.startTime);
  const eStr=fTime(itin.endTime);
  // Show date if not today
  const startDate=fDateStr(itin.startTime);
  const endDate=fDateStr(itin.endTime);
  const todayStr=new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',timeZone:'Asia/Tokyo'});
  const dateLabel=endDate&&endDate!==todayStr?` (${endDate})`:'';
  const transfers=itin.transfers??0;
  const totalDur=itin.legs.reduce((a,l)=>a+(l.duration||0),0)||1;
  const barHTML=itin.legs.map(leg=>{
    const pct=Math.max(4,Math.round(((leg.duration||0)/totalDur)*100));
    const col=legColor(leg);
    const lbl=legBarLabel(leg);
    const title=legName(leg);
    return `<div class="leg-bar-seg" style="flex:${pct};background:${col}" title="${title}">${lbl}</div>`;
  }).join('');
  const tiHTML=buildTransitLegsHTML(itin.legs);
  // Line badges — use MOTIS direct fields
  const lineBadges=itin.legs.filter(l=>l.mode!=='WALK').map(l=>{
    const rc=l.routeColor||l.route?.color||'9C27B0';
    const col=rc.startsWith('#')?rc:'#'+rc;
    const name=l.routeShortName||l.displayName||l.route?.shortName||modeName(l.mode);
    return`<span class="rt-tag" style="background:${col}22;color:${col};border:1px solid ${col}44">${name}</span>`;
  }).join('');
  return `<div class="rt-card${idx===0?' sel tsel':''}" id="tcard-${idx}" onclick="selectTransitCard(${idx})">
    <div class="rt-top">
      <span class="rt-time" style="color:var(--pu)">${fDur(itin.duration)}</span>
      <span class="rt-dist" style="font-size:14px;font-weight:500">${sStr} → ${eStr}${dateLabel}</span>
    </div>
    <div class="leg-bar" style="margin:8px 0">${barHTML}</div>
    <div class="rt-eta">
      <i class="fa fa-clock" style="color:var(--g400)"></i>
      到着予定: <span class="rt-eta-time">${eStr}${dateLabel}</span>
      &nbsp;·&nbsp; 乗り換え <b>${transfers}回</b>
    </div>
    <div class="rt-tags">${lineBadges}</div>
    <div class="ti-legs">${tiHTML}</div>
    ${idx===0?`<button class="nav-start-btn purple" style="margin-top:12px" onclick="startNavTransit(event)"><i class="fa fa-location-arrow"></i> 案内開始</button>`:''}
  </div>`;
}

function buildTransitLegsHTML(legs){
  let html='';
  legs.forEach((leg,i)=>{
    const isWalk=leg.mode==='WALK';
    const col=legColor(leg);
    const depT=fTime(leg.startTime);
    const arrT=fTime(leg.endTime);
    const isLast=i===legs.length-1;

    html+=`<div class="ti-node">
      <div class="ti-node-line">
        <div class="ti-dot" style="color:${col}"></div>
        ${!isLast?`<div class="ti-bar" style="background:${isWalk?col+'50':col}"></div>`:''}
      </div>
      <div class="ti-inf">
        <div class="ti-station">${leg.from?.name||'出発地'}</div>
        <div class="ti-time">${depT}</div>`;

    if(isWalk){
      html+=`<div class="ti-leg-detail"><i class="fa fa-person-walking" style="color:${col}"></i>徒歩 ${fDur(leg.duration)} (${fDist(leg.distance||0)})</div>`;
    } else {
      // MOTIS: routeColor, routeLongName, routeShortName, displayName are on the leg directly
      const lineColor = leg.routeColor ? '#'+leg.routeColor : col;
      const lineName  = leg.routeLongName||leg.routeShortName||leg.displayName||modeName(leg.mode);
      const agency    = leg.agencyName?` (${leg.agencyName})`:'';
      const dir       = leg.headsign ? ` ${leg.headsign}` : '';
      const intStops  = leg.intermediateStops||[];
      const stopCnt   = intStops.length+1;
      const sid       = `stops-${i}`;
      const realTime  = leg.realTime?' 🟢リアルタイム':'';
      html+=`<div class="ti-badge" style="background:${lineColor}">
        <i class="fa ${modeIcon(leg.mode)}"></i> ${lineName}${dir}
      </div>
      <div class="ti-leg-detail" style="color:var(--g500);font-size:12px">${agency}${realTime}</div>
      <div class="ti-leg-detail"><i class="fa fa-circle-dot" style="color:${lineColor}"></i>${stopCnt}駅 · ${fDur(leg.duration)} · ${fDist(leg.distance||0)}</div>`;
      if(intStops.length){
        html+=`<div class="ti-stops" onclick="toggleStops('${sid}')">
          <i class="fa fa-chevron-down" id="arr-${sid}" style="font-size:10px;transition:transform .2s"></i> ${intStops.length}つの途中駅
        </div>
        <div class="ti-stop-list" id="${sid}">
          ${intStops.map(s=>{
            const sArr=fTime(s.arrival||s.scheduledArrival);
            const sDep=fTime(s.departure||s.scheduledDeparture);
            const cancelled=s.cancelled?'<span style="color:var(--rd);margin-left:4px">運休</span>':'';
            return `<div class="ti-stop-item">🚉 ${s.name||'途中駅'} <span style="color:var(--g500);margin-left:6px">${sArr}</span>${cancelled}</div>`;
          }).join('')}
        </div>`;
      }
    }
    html+=`</div></div>`;

    // Transfer indicator between consecutive non-walk transit legs
    if(!isWalk && i<legs.length-1){
      const next=legs[i+1];
      if(next && next.mode!=='WALK'){
        const waitMs=new Date(next.startTime)-new Date(leg.endTime);
        const wait=Math.max(0,Math.round(waitMs/60000));
        html+=`<div class="ti-transfer">
          <i class="fa fa-arrow-right-arrow-left" style="color:var(--yw)"></i>
          <div><b>${leg.to?.name||'乗換駅'}で乗り換え</b><br>
          <span style="font-size:11px;color:var(--g500)">乗換待ち時間 約${wait}分</span></div>
        </div>`;
      }
    }
  });

  // Final destination node
  const last=legs[legs.length-1];
  html+=`<div class="ti-node">
    <div class="ti-node-line"><div class="ti-dot" style="color:var(--rd)"></div></div>
    <div class="ti-inf">
      <div class="ti-station" style="color:var(--rd)">📍 ${last.to?.name||'目的地'}</div>
      <div class="ti-time">${fTime(last.endTime)} 到着</div>
    </div>
  </div>`;
  return html;
}

function toggleStops(id){
  const el=document.getElementById(id); if(!el)return;
  el.classList.toggle('v');
  const arr=document.getElementById('arr-'+id);
  if(arr) arr.style.transform=el.classList.contains('v')?'rotate(180deg)':'rotate(0deg)';
}

function selectTransitCard(idx){
  currentItins.forEach((_,i)=>{
    const c=document.getElementById('tcard-'+i);
    if(c){c.classList.toggle('sel',i===idx);c.classList.toggle('tsel',i===idx)}
  });
  if(currentItins[idx]){
    drawTransitItin(currentItins[idx]);
    selRoute=itin2Route(currentItins[idx],selRoute?.fLL,selRoute?.tLL);
  }
  document.querySelectorAll('.nav-start-btn.purple').forEach((b,i)=>{
    b.style.display=i===idx?'flex':'none';
  });
}

function drawTransitItin(itin){
  clearRtLayers();
  itin.legs.forEach(leg=>{
    const isWalk=leg.mode==='WALK';
    const col=legColor(leg);
    // Try to decode geometry string; fall back to straight from→to
    const legPrec=leg.legGeometry?.precision??6;
    let pts=leg.legGeometry?.points ? decodePL(leg.legGeometry.points,legPrec) : [];
    if(!pts.length && leg.from && leg.to){
      pts=[[leg.from.lat,leg.from.lon],[leg.to.lat,leg.to.lon]];
    }
    if(!pts.length) return;
    const l=L.polyline(pts,{color:col,weight:isWalk?3:5,opacity:isWalk?.65:.9,dashArray:isWalk?'6 5':null}).addTo(map);
    rtLayers.push(l);
    if(!isWalk){
      const sic=L.divIcon({className:'',html:`<div style="width:10px;height:10px;background:${col};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,iconSize:[10,10],iconAnchor:[5,5]});
      if(leg.from){const m=L.marker([leg.from.lat,leg.from.lon],{icon:sic}).bindTooltip(leg.from.name,{permanent:false}).addTo(map);rtMs.push(m)}
      if(leg.to){const m=L.marker([leg.to.lat,leg.to.lon],{icon:sic}).bindTooltip(leg.to.name,{permanent:false}).addTo(map);rtMs.push(m)}
    }
  });
  const fLL=itin.legs[0]?.from, tLL=itin.legs[itin.legs.length-1]?.to;
  if(fLL)rtMs.push(L.marker([fLL.lat,fLL.lon],{icon:pinIc('#9C27B0','A')}).addTo(map));
  if(tLL)rtMs.push(L.marker([tLL.lat,tLL.lon],{icon:pinIc('#EA4335','B')}).addTo(map));
  const allPts=itin.legs.flatMap(l=>{
    const prec=l.legGeometry?.precision??6;
    const pts=l.legGeometry?.points?decodePL(l.legGeometry.points,prec):[];
    return pts.length?pts:(l.from&&l.to?[[l.from.lat,l.from.lon],[l.to.lat,l.to.lon]]:[]);
  });
  if(allPts.length) try{map.fitBounds(L.latLngBounds(allPts),{padding:[80,80]})}catch{}
}

function itin2Route(itin,fLL,tLL){
  const steps=[];
  itin.legs.forEach(leg=>{
    const depT=`${pad(new Date(leg.startTime).getHours())}:${pad(new Date(leg.startTime).getMinutes())}`;
    const arrT=`${pad(new Date(leg.endTime).getHours())}:${pad(new Date(leg.endTime).getMinutes())}`;
    if(leg.mode==='WALK'){
      if(leg.steps?.length){
        leg.steps.forEach(s=>steps.push({instruction:mText(s.type||'',s.absoluteDirection||'',s.streetName||s.name||''),distance:s.distance||0,duration:s.duration||0,maneuver:{type:s.type||'turn',modifier:s.absoluteDirection||'straight'}}));
      } else {
        steps.push({instruction:`🚶 徒歩: ${leg.from?.name||''} → ${leg.to?.name||''}`,distance:leg.distance||0,duration:leg.duration,maneuver:{type:'depart',modifier:'straight'}});
      }
    } else {
      const ln=leg.route?.longName||leg.route?.shortName||modeName(leg.mode);
      steps.push({instruction:`🚃 ${ln}に乗車`,subtext:`${leg.from?.name||''} ${depT}発 → ${leg.headsign||''}`,distance:0,duration:0,maneuver:{type:'depart',modifier:'straight'},isTransit:true,transitColor:legColor(leg)});
      (leg.intermediateStops||[]).slice(0,5).forEach(s=>steps.push({instruction:`🚉 ${s.name||'途中駅'}`,distance:0,duration:0,maneuver:{type:'continue'},isTransit:true}));
      steps.push({instruction:`🚉 ${leg.to?.name||''}で下車`,subtext:`${arrT}着`,distance:leg.distance||0,duration:leg.duration,maneuver:{type:'arrive',modifier:'straight'},isTransit:true,transitColor:legColor(leg)});
    }
  });
  steps.push({instruction:'📍 目的地に到着',distance:0,duration:0,maneuver:{type:'arrive',modifier:'straight'}});
  const allPts=itin.legs.flatMap(l=>{const prec=l.legGeometry?.precision??6;const p=l.legGeometry?.points?decodePL(l.legGeometry.points,prec):[];return p.length?p:(l.from&&l.to?[[l.from.lat,l.from.lon],[l.to.lat,l.to.lon]]:[])});
  return{pts:allPts,steps,duration:itin.duration,distance:itin.legs.reduce((a,l)=>a+(l.distance||0),0),fLL:fLL||{lat:itin.legs[0]?.from?.lat,lng:itin.legs[0]?.from?.lon},tLL:tLL||{lat:itin.legs.at(-1)?.to?.lat,lng:itin.legs.at(-1)?.to?.lon},mode:'transit'};
}

function startNavOSRM(e,idx){e?.stopPropagation();if(selRoute)beginNav(selRoute)}
function startNavTransit(e,idx){e?.stopPropagation();if(selRoute)beginNav(selRoute)}

function beginNav(route){
  nav={active:true,steps:route.steps,cur:0,wid:null,totalDist:route.distance,totalDur:route.duration,
    remainDist:route.distance,remainDur:route.duration,destLL:route.tLL,pts:route.pts,mode:route.mode,startTime:Date.now()};
  document.getElementById('nav-hud').classList.add('on');
  document.getElementById('nav-btm').classList.add('on');
  document.getElementById('btabs').classList.add('hide');
  closeSB();
  navFollowing=true;
  updateHUD(0);updateBtm();
  if(navigator.geolocation){
    nav.wid=navigator.geolocation.watchPosition(onGPS,()=>startDemoNav(),{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  } else startDemoNav();
  toast('🚀 案内を開始しました');
}

function startDemoNav(){
  let ptIdx=0;
  const pts=nav.pts||[];
  demoIv=setInterval(()=>{
    if(!nav.active){clearInterval(demoIv);return}
    ptIdx=Math.min(ptIdx+2,pts.length-1);
    if(pts[ptIdx]){
      const ll={lat:pts[ptIdx][0],lng:pts[ptIdx][1]};
      if(navFollowing)map.panTo(ll,{animate:true,duration:.4});
      const prog=ptIdx/Math.max(pts.length-1,1);
      const newCur=Math.min(Math.floor(prog*nav.steps.length),nav.steps.length-1);
      if(newCur!==nav.cur){nav.cur=newCur;updateHUD(newCur)}
      nav.remainDist=nav.totalDist*(1-prog);
      nav.remainDur=nav.totalDur*(1-prog);
      const pct=Math.round(prog*100);
      document.getElementById('nav-progress-fill').style.width=pct+'%';
      updateBtm();
      if(ptIdx>=pts.length-1)setTimeout(()=>stopNav(true),1500);
    }
  },280);
}

function onGPS(pos){
  const{latitude:lat,longitude:lng}=pos.coords;
  if(myM)map.removeLayer(myM);
  myM=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="loc-ring"><div class="loc-dot"></div></div>',iconSize:[56,56],iconAnchor:[28,28]}),zIndexOffset:1000}).addTo(map);
  if(navFollowing)map.panTo([lat,lng],{animate:true,duration:.4});
  const spd={drive:40000/3600,bike:15000/3600,walk:4000/3600,transit:30000/3600}[nav.mode]||10;
  const remD=haverD(lat,lng,nav.destLL?.lat||lat,nav.destLL?.lng||nav.destLL?.lon||lng);
  nav.remainDist=remD;nav.remainDur=remD/spd;
  const prog=Math.max(0,1-(remD/nav.totalDist));
  const newCur=Math.min(Math.floor(prog*nav.steps.length),nav.steps.length-1);
  if(newCur>nav.cur){nav.cur=newCur;updateHUD(newCur)}
  document.getElementById('nav-progress-fill').style.width=Math.round(prog*100)+'%';
  updateBtm();
  if(remD<30)setTimeout(()=>stopNav(true),1000);
}

function updateHUD(stepIdx){
  const step=nav.steps[stepIdx];if(!step)return;
  const type=step.maneuver?.type||'turn';
  const mod=step.maneuver?.modifier||'straight';
  const arrow=step.isTransit?modeEmoji(nav.mode):mArrow(type,mod);
  const main=step.instruction||mText(type,mod,step.name||'');
  const sub=step.subtext||(step.name&&step.name!==step.instruction?step.name:'');
  document.getElementById('nav-arrow').textContent=arrow;
  document.getElementById('nav-main').textContent=step.distance>0?fDist(step.distance):main;
  document.getElementById('nav-sub').textContent=step.distance>0?main:sub||'';
  // Bar color
  const bar=document.getElementById('nav-bar');
  bar.className='';
  if(type==='arrive')bar.classList.add('arrive');
  else if(step.isTransit)bar.classList.add('transit-leg');
  else if(mod.includes('left')||mod.includes('right'))bar.classList.add('turn');
  // Next step
  const next=nav.steps[stepIdx+1];
  document.getElementById('nav-nb-txt').textContent=next?(mArrow(next.maneuver?.type||'',next.maneuver?.modifier||'')+' '+(next.instruction||next.name||'次')):'まもなく目的地';
  // Highlight in step list
  document.querySelectorAll('.step-item').forEach((el,i)=>{
    el.classList.toggle('cs',i===stepIdx);
    if(i===stepIdx)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

function updateBtm(){
  document.getElementById('nav-rt').textContent=fDur(nav.remainDur);
  document.getElementById('nav-rd').textContent=fDist(nav.remainDist);
  document.getElementById('nav-eta').textContent=calcETA(nav.remainDur);
}

function stopNav(arrived=false){
  if(nav.wid)navigator.geolocation.clearWatch(nav.wid);
  if(demoIv){clearInterval(demoIv);demoIv=null}
  nav.active=false;
  document.getElementById('nav-hud').classList.remove('on');
  document.getElementById('nav-btm').classList.remove('on');
  document.getElementById('nav-recenter').classList.remove('on');
  document.getElementById('btabs').classList.remove('hide');
  document.getElementById('nav-progress-fill').style.width='0%';
  toast(arrived?'🎉 目的地に到着しました！':'案内を終了しました');
}

function navRecenter(){
  navFollowing=true;
  document.getElementById('nav-recenter').classList.remove('on');
  if(myM)map.panTo(myM.getLatLng(),{animate:true});
}

function locateMe(silent=false){
  if(!silent)toast('📡 現在地を取得中...');
  navigator.geolocation?.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
    myLL={lat,lng};
    if(myM)map.removeLayer(myM);
    if(myAcc)map.removeLayer(myAcc);
    myAcc=L.circle([lat,lng],{radius:acc,color:'#1A73E8',fillColor:'#1A73E8',fillOpacity:.08,weight:1}).addTo(map);
    myM=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="loc-ring"><div class="loc-dot"></div></div>',iconSize:[56,56],iconAnchor:[28,28]}),zIndexOffset:1000}).addTo(map);
    map.flyTo([lat,lng],16,{duration:1.2});
    if(!silent)toast('✅ 現在地を表示しました');
  },()=>toast('❌ 位置情報を取得できませんでした'),{enableHighAccuracy:true});
}

async function geoVal(v){
  const m=v.match(/^(-?\d+\.?\d*),\s*(-?\d+\.?\d*)$/);
  if(m)return{lat:+m[1],lng:+m[2]};
  const r=await fetch(`${NOM}/search?q=${enc(v)}&format=json&limit=1&accept-language=ja`);
  const d=await r.json();
  if(!d.length)throw new Error(`場所が見つかりません: ${v}`);
  return{lat:+d[0].lat,lng:+d[0].lon};
}
// decodePL: precision param matches MOTIS legGeometry.precision
// MOTIS v5 = precision 6 (÷1e6); OSRM standard = precision 5 (÷1e5)
function decodePL(e, prec){
  if(!e||e==='??'||e.length<2)return[];
  const factor=Math.pow(10,prec!=null?prec:6); // default MOTIS precision=6
  let i=0,la=0,ln=0,r=[];
  while(i<e.length){let b,s=0,res=0;do{b=e.charCodeAt(i++)-63;res|=(b&0x1f)<<s;s+=5}while(b>=0x20);la+=(res&1)?~(res>>1):(res>>1);s=0;res=0;do{b=e.charCodeAt(i++)-63;res|=(b&0x1f)<<s;s+=5}while(b>=0x20);ln+=(res&1)?~(res>>1):(res>>1);r.push([la/factor,ln/factor])}
  return r;
}
// OSRM uses standard precision=5
function decodePL_OSRM(e){return decodePL(e,5)}
function haverD(la1,ln1,la2,ln2){
  const R=6371000,dL=(+la2-+la1)*Math.PI/180,dl=(+ln2-+ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(+la1*Math.PI/180)*Math.cos(+la2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fDist(m){return m>=1000?`${(m/1000).toFixed(1)} km`:`${Math.round(m)} m`}
function fDur(s){s=Math.max(0,Math.round(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}時間${m}分`:m>0?`${m}分`:'1分未満'}
function calcETA(dur){const t=new Date(Date.now()+dur*1000);return`${t.getHours()}:${pad(t.getMinutes())}`}
// JST time/date formatters (API returns UTC ISO strings)
function fTime(iso){if(!iso)return'--:--';try{return new Date(iso).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tokyo',hour12:false})}catch{return'--:--'}}
function fDateTime(iso){if(!iso)return'';try{const d=new Date(iso);return d.toLocaleString('ja-JP',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tokyo',hour12:false})}catch{return''}}
function fDateStr(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',timeZone:'Asia/Tokyo'})}catch{return''}}
function pad(n){return String(n).padStart(2,'0')}
function enc(s){return encodeURIComponent(s)}
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/\\/g,'\\\\')}
function clearRtLayers(){rtLayers.forEach(l=>map.removeLayer(l));rtLayers=[];rtMs.forEach(m=>map.removeLayer(m));rtMs=[];selRoute=null;currentItins=[]}
function pinIc(col,l){return L.divIcon({className:'',html:`<div style="width:28px;height:28px;background:${col};border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${l}</div>`,iconSize:[28,28],iconAnchor:[14,14]})}

// Maneuver arrows
function mArrow(type,mod){
  if(type==='arrive')return'📍';if(type==='depart')return'▶';
  if(type==='roundabout'||type==='rotary')return'↻';if(type==='uturn')return'↺';
  if(mod==='sharp left')return'↰';if(mod==='left')return'←';if(mod==='slight left')return'↖';
  if(mod==='slight right')return'↗';if(mod==='right')return'→';if(mod==='sharp right')return'↱';
  return'↑';
}
function mIc(type,mod){
  if(type==='arrive')return'fa-location-dot';if(type==='depart')return'fa-play';
  if(type==='roundabout')return'fa-rotate-right';
  if(mod?.includes('left'))return'fa-turn-left';if(mod?.includes('right'))return'fa-turn-right';
  return'fa-arrow-up';
}
function mText(type,mod,street){
  if(type==='arrive')return'目的地に到着';if(type==='depart')return'出発します';
  if(mod==='left')return`左折${street?' — '+street:''}`;if(mod==='right')return`右折${street?' — '+street:''}`;
  if(mod==='slight left')return`やや左へ${street?' — '+street:''}`;if(mod==='slight right')return`やや右へ${street?' — '+street:''}`;
  return`直進${street?' — '+street:''}`;
}
function modeEmoji(m){return{drive:'🚗',walk:'🚶',bike:'🚲',transit:'🚃'}[m]||'📍'}

// Transit leg helpers
function legColor(leg){
  if(leg.mode==='WALK')return'#5F6368';
  // MOTIS API: routeColor is directly on leg (not leg.route.color)
  const c=leg.routeColor||leg.route?.color;
  if(c)return c.startsWith('#')?c:'#'+c;
  return{BUS:'#FF9800',RAIL:'#2196F3',REGIONAL_RAIL:'#2196F3',SUBURBAN:'#4CAF50',SUBWAY:'#9C27B0',TRAM:'#4CAF50',FERRY:'#03A9F4'}[leg.mode]||'#9C27B0';
}
function legLineName(leg){
  // MOTIS: routeLongName / routeShortName / displayName directly on leg
  return leg.routeLongName||leg.routeShortName||leg.displayName||leg.route?.longName||leg.route?.shortName||modeName(leg.mode);
}
function legBarLabel(leg){if(leg.mode==='WALK')return'🚶';const n=leg.routeShortName||leg.displayName||leg.route?.shortName||'';return n.slice(0,3)||modeName(leg.mode).slice(0,2)}
function legName(leg){return leg.mode==='WALK'?`徒歩 ${fDist(leg.distance||0)}`:legLineName(leg)}
function modeName(m){return{WALK:'徒歩',BUS:'バス',RAIL:'鉄道',SUBWAY:'地下鉄',TRAM:'路面電車',FERRY:'フェリー',GONDOLA:'ゴンドラ',CABLE_CAR:'ケーブルカー',REGIONAL_RAIL:'鉄道',SUBURBAN:'近郊鉄道',COACH:'高速バス',MONORAIL:'モノレール',AERIAL_LIFT:'ロープウェー'}[m]||m}
function modeIcon(m){return{WALK:'fa-person-walking',BUS:'fa-bus',RAIL:'fa-train',REGIONAL_RAIL:'fa-train',SUBURBAN:'fa-train',SUBWAY:'fa-train-subway',TRAM:'fa-train-tram',FERRY:'fa-ferry',MONORAIL:'fa-train',COACH:'fa-bus'}[m]||'fa-train'}

// POI icon / color
function tIcon(t,c){const m={restaurant:'fa-utensils',cafe:'fa-mug-hot',hotel:'fa-bed',hospital:'fa-hospital',pharmacy:'fa-pills',atm:'fa-money-bill',parking:'fa-square-parking',fuel:'fa-gas-pump',supermarket:'fa-cart-shopping',station:'fa-train',subway:'fa-train-subway',park:'fa-tree',school:'fa-school'};return m[t]||(c==='railway'?'fa-train':c==='place'?'fa-city':'fa-location-dot')}
function tColor(t){return{restaurant:'#E91E63',cafe:'#795548',hotel:'#34A853',hospital:'#EA4335',pharmacy:'#34A853',atm:'#FBBC04',parking:'#1A73E8',fuel:'#FF9800',supermarket:'#4CAF50'}[t]||'#1A73E8'}
function catLabel(t){return{restaurant:'レストラン',cafe:'カフェ',convenience_store:'コンビニ',hotel:'ホテル',hospital:'病院',pharmacy:'薬局',atm:'ATM',parking:'駐車場',fuel:'ガソリンスタンド',supermarket:'スーパー'}[t]||t||'スポット'}

let tt;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.style.display='block';clearTimeout(tt);tt=setTimeout(()=>e.style.display='none',3500)}
function spin(v){document.getElementById('spin').style.display=v?'block':'none'}

// ── BOOT ──
initMap();
if(window.innerWidth>=768)document.getElementById('sb').classList.add('open');
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();$si().focus();$si().select()}});
</script>
